<!--@subject New Contact Form Submission @-->

<!--@vars {
"name":"Customer Name",
"email":"Customer Email",
"telephone":"Customer Phone",
"comment":"Message"
} @-->

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f4f4" style="margin:0; padding:0;">
    <tr>
        <td align="center">

            <!-- Main Container -->
            <table width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="margin-top:30px; border-radius:8px; overflow:hidden; font-family: Arial, sans-serif;">

                <!-- Header -->
                <tr>
                    <td style="background-color:#2c3e50; padding:20px; text-align:center;">
                        <h2 style="color:#ffffff; margin:0;">New Contact Request</h2>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:30px; color:#333333;">

                        <p style="font-size:16px; margin-bottom:20px;">
                            You have received a new inquiry from your website.
                        </p>

                        <!-- Details Table -->
                        <table width="100%" cellpadding="10" cellspacing="0" border="0" style="border:1px solid #e0e0e0; border-radius:6px;">
                            
                            <tr>
                                <td style="background:#f9f9f9; width:30%;"><strong>Name</strong></td>
                                <td>{{var name}}</td>
                            </tr>

                            <tr>
                                <td style="background:#f9f9f9;"><strong>Email</strong></td>
                                <td>
                                    <a href="mailto:{{var email}}" style="color:#3498db; text-decoration:none;">
                                        {{var email}}
                                    </a>
                                </td>
                            </tr>

                            <tr>
                                <td style="background:#f9f9f9;"><strong>Phone</strong></td>
                                <td>{{var telephone}}</td>
                            </tr>

                            <tr>
                                <td style="background:#f9f9f9;"><strong>Message</strong></td>
                                <td style="line-height:1.6;">
                                    {{var comment}}
                                </td>
                            </tr>

                        </table>

                        <!-- CTA -->
                        <p style="margin-top:25px; font-size:14px; color:#777;">
                            Please respond to the customer as soon as possible.
                        </p>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f4f4f4; padding:20px; text-align:center; font-size:12px; color:#999;">
                        <p style="margin:0;">
                            © {{var store.getFrontendName()}} | All Rights Reserved
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>
